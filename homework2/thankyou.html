<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayou City Medical - Thank You</title>
  
  <link rel="stylesheet" href="style.css">
</head>
 
<body>
 
   
  <div id="header" class="banner">
    <img src="logo.png" alt="Bayou City Medical logo" class="logo" width="80" height="80">
 
    <div class="banner-text">
       <h1>Bayou City Medical</h1>
      <p class="tagline">New Patient Registration</p>
    </div>
 
     
    <p class="banner-date">today is: <span id="todayDate"></span></p>
    <script>
       
      var today = new Date();
      var dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday",
                      "Thursday", "Friday", "Saturday"];
      var monthNames = ["January", "February", "March", "April", "May", "June",
                        "July", "August", "September", "October", "November", "December"];
 
      function ordinal(n) {
        if (n > 3 && n < 21) return n + "th";
        switch (n % 10) {
          case 1: return n + "st";
          case 2: return n + "nd";
           case 3: return n + "rd";
          default: return n + "th";
        }
      }
 
      var dateText = dayNames[today.getDay()] + ", " +
                     monthNames[today.getMonth()] + " " +
                     ordinal(today.getDate()) + ", " +
                     today.getFullYear();
      document.getElementById("todayDate").textContent = dateText;
    </script>
  </div>
   
 
 
  
  <div id="main" class="content">
    <div class="thankyou-box">
      <h2>Thank you for your submission.</h2>
      <p>Your registration has been received by Bayou City Medical.</p>
       <p><a href="homework2.html">Return to the registration form</a></p>
    </div>
  </div>
   
 
 
   
  <div id="footer" class="site-footer">
    <span class="footer-name">Bayou City Medical</span>
 
     
    <button type="button" class="contact-btn"
            onclick="window.location.href='mailto:info@bayoucitymedical.example';">
      Contact Us
    </button>
 
    <span class="footer-links">
      <a href="https://www.facebook.com">Facebook</a> |
       <a href="https://www.x.com">X</a> |
       <a href="https://www.instagram.com">Instagram</a>
    </span>
 
    <span class="footer-addr">PO BOX 18881 &nbsp; Sugar Land, TX 77496</span>
  </div>
   
 
</body>
</html>
